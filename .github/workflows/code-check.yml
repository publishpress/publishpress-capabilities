name: Enforce code standards and compatibility
permissions:
  contents: read
on:
  pull_request:
    branches:
      - 'master'
      - 'development'
      - 'release/*'
      - 'release-*'

  workflow_call:

  workflow_dispatch:

jobs:
  check:
    uses: publishpress/github-workflows/.github/workflows/code-standards.yml@v3

